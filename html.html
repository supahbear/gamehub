<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - TTRPG World Hub</title>
    
    <!-- ADD: Preload critical background video -->
    <link rel="preload" href="assets/videos/Breach-vid.mp4" as="video" type="video/mp4">
    
    <!-- CSS files in load order: foundation → components → content → overrides -->
    <link href="base.css" rel="stylesheet" type="text/css" />
    <link href="components.css" rel="stylesheet" type="text/css" />
    <link href="cards.css" rel="stylesheet" type="text/css" />
    <link href="features.css" rel="stylesheet" type="text/css" />
    <link href="modals.css" rel="stylesheet" type="text/css" />
    <link href="utilities.css" rel="stylesheet" type="text/css" />
    <link href="responsive.css" rel="stylesheet" type="text/css" />
    
    <!-- Breach theme (single world) -->
    <link href="breach-theme.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <!-- Background video layer for world selection -->
    <div id="worldBackgroundLayer" class="world-background-layer">
        <!-- NEW: Neutral default background -->
        <video id="bgVideo-neutral" class="world-bg-video active" autoplay muted loop playsinline>
            <source src="assets/videos/neutral-landing.mp4" type="video/mp4">
        </video>
        
        <!-- Breach background (start inactive) -->
        <video id="bgVideo-breach" class="world-bg-video" muted loop playsinline>
            <source src="assets/videos/Breach-vid.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <header>
            <div class="logo-container" onclick="window.location.reload()">
                <img src="assets/breach-logo.png" alt="The Breach" class="logo" />
                <h1 class="logo-fallback">The Breach</h1>
            </div>
        </header>

        <main>
            <section class="landing-screen">
                <h2>Tales from the Breach...</h2>
                <div class="worlds-grid" id="worldsGrid">
                    <!-- Loading card - shows card asset video with Loading overlay -->
                    <div class="world-card loading" data-loading="true" data-world-id="breach">
                        <video class="world-video" muted loop playsinline autoplay>
                            <source src="assets/videos/breach-loopv2.mp4" type="video/mp4">
                        </video>
                        <div class="world-name">Loading</div>
                        <div class="world-overlay">
                            <div class="world-description">Preparing to enter The Breach...</div>
                            <div class="world-system">System: D&D 5e</div>
                        </div>
                    </div>
                </div>
                
                <div class="landing-message">
                    <div class="message-content" id="landingMessage">
                        Welcome to the Nexus! This platform is intended as a multi-campaign hub within the same universe. Enjoy 🖤
                    </div>
                </div>
            </section>

            <section class="world-hub" id="worldHub" style="display: none;">
                <div class="hub-header">
                    <h2 id="currentWorldName">World Name</h2>
                </div>
                <span class="current-mode" id="currentMode">Mode: Explore</span>
                <div class="hub-content" id="hubContent">
                    <!-- Dynamic content based on world and mode -->
                </div>
                <!-- REMOVED: back button - logo click reloads instead -->
            </section>
        </main>

        <!-- Article Modal -->
        <div id="modalOverlay" class="modal-overlay">
            <div class="article-modal" id="articleModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 id="modalTitle">Article Title</h2>
                        <button class="close-btn" id="closeModalBtn">&times;</button>
                    </div>
                    <div class="modal-body" id="modalBody">
                        <!-- Article content will be loaded here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Tour Modal -->
        <div id="tourModalOverlay" class="modal-overlay">
            <!-- Small centered loading box shown while slides load -->
            <div id="tourLoadingBox" class="tour-loading-box" style="display: none;">
                Loading tour...
            </div>

            <div class="tour-modal" id="tourModal">
                <div class="modal-content">
                    <div class="tour-slide-container" id="tourSlideContainer"></div>
                </div>
                <div class="tour-modal-navigation">
                    <button class="tour-nav-btn" id="tourModalPrevBtn">Previous</button>
                    <div class="tour-dots" id="tourModalDots"></div>
                    <button class="tour-nav-btn" id="tourModalNextBtn">Next</button>
                </div>
                <button id="closeTourModalBtn" class="close-btn">&times;</button>
            </div>
        </div>
    </div>

    <!-- JavaScript files -->
    <script src="config.js"></script>
    <script src="script.js"></script>
    <script src="article_viewer.js"></script>
    <script src="tour_viewer.js"></script>
    <script src="quest_viewer.js"></script>
</body>
</html>
